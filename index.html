<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JMD Boot House - Premium Footwear</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
    -webkit-tap-highlight-color: transparent;
}

body {
    background: #f8f9fa;
    color: #111;
    padding-bottom: 95px;
}

/* ===== HEADER ===== */
.header {
    padding: 16px 18px 12px;
    background: #fff;
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: 0 2px 20px rgba(0,0,0,0.04);
}

.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
}

.logo {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #ff3f6c, #ff6b8a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    cursor: pointer;
}

.logo span {
    background: linear-gradient(135deg, #ff6b00, #ffe600);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.icons {
    display: flex;
    gap: 18px;
    font-size: 22px;
    cursor: pointer;
}

.icons div {
    position: relative;
    transition: transform 0.3s;
}

.icons div:hover {
    transform: scale(1.1);
}

.cart-count, .wishlist-count {
    position: absolute;
    top: -8px;
    right: -10px;
    background: #ff3f6c;
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

.search {
    height: 50px;
    background: #f5f5f7;
    border-radius: 25px;
    display: flex;
    align-items: center;
    padding: 0 20px;
    transition: all 0.3s;
}

.search:focus-within {
    background: #fff;
    box-shadow: 0 0 0 2px #ff3f6c, 0 4px 20px rgba(255,63,108,0.1);
}

.search input {
    width: 100%;
    border: none;
    background: transparent;
    outline: none;
    font-size: 14px;
    margin-left: 12px;
    font-weight: 400;
}

.search input::placeholder {
    color: #999;
}

/* ===== BANNER ===== */
.banner-section {
    padding: 0 18px;
    margin: 16px 0;
}

.banner {
    height: 200px;
    border-radius: 28px;
    overflow: hidden;
    position: relative;
}

.banner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.banner-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(0,0,0,0.2));
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 30px;
    color: #fff;
}

.banner-overlay h1 {
    font-size: 32px;
    line-height: 1.1;
    font-weight: 800;
}

.banner-overlay p {
    font-size: 13px;
    opacity: 0.8;
    margin: 8px 0 16px;
}

.banner-overlay button {
    width: 150px;
    height: 48px;
    border: none;
    border-radius: 40px;
    background: #fff;
    color: #111;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.3s;
}

.banner-overlay button:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
}

/* ===== CATEGORIES ===== */
.section-title {
    padding: 24px 18px 16px;
    font-size: 20px;
    font-weight: 700;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.section-title a {
    font-size: 13px;
    color: #ff3f6c;
    font-weight: 500;
    text-decoration: none;
}

.categories {
    display: flex;
    overflow-x: auto;
    padding: 0 18px 12px;
    gap: 16px;
    scrollbar-width: none;
}

.categories::-webkit-scrollbar {
    display: none;
}

.category {
    min-width: 80px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.3s;
}

.category:hover {
    transform: translateY(-4px);
}

.category img {
    width: 76px;
    height: 76px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 6px;
    border: 3px solid transparent;
    transition: all 0.3s;
}

.category.active img {
    border-color: #ff3f6c;
}

.category p {
    font-size: 12px;
    font-weight: 500;
}

/* ===== PRODUCT GRID ===== */
.products {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    padding: 0 18px 20px;
}

.card {
    background: #fff;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 2px 15px rgba(0,0,0,0.04);
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
}

.card:hover {
    transform: translateY(-6px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.08);
}

.card-img {
    position: relative;
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 230px;
    object-fit: cover;
    transition: transform 0.6s;
}

.card:hover img {
    transform: scale(1.05);
}

.badge {
    position: absolute;
    left: 12px;
    top: 12px;
    background: #111;
    color: #fff;
    padding: 4px 14px;
    border-radius: 30px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    z-index: 2;
}

.badge.sale {
    background: #ff3f6c;
}

.wishlist-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    border: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    cursor: pointer;
    transition: all 0.3s;
    z-index: 2;
}

.wishlist-btn:hover {
    transform: scale(1.1);
}

.wishlist-btn.active {
    background: #ff3f6c;
    color: #fff;
}

.quick-add {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.6));
    padding: 20px 16px 14px;
    transform: translateY(100%);
    transition: transform 0.3s;
}

.card:hover .quick-add {
    transform: translateY(0);
}

.quick-add button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 14px;
    background: #fff;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.3s;
}

.quick-add button:hover {
    background: #ff3f6c;
    color: #fff;
}

.info {
    padding: 12px 14px 14px;
}

.brand {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 2px;
}

.name {
    font-size: 12px;
    color: #888;
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.rating {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: #f59e0b;
    margin-bottom: 6px;
}

.rating span {
    color: #888;
    margin-left: 4px;
}

.price {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}

.new-price {
    font-size: 16px;
    font-weight: 700;
}

.old-price {
    font-size: 12px;
    text-decoration: line-through;
    color: #999;
}

.discount {
    font-size: 11px;
    font-weight: 600;
    color: #ff3f6c;
}

/* ===== SIZES ===== */
.size-selector {
    display: flex;
    gap: 6px;
    padding: 8px 0 4px;
}

.size-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid #eee;
    background: transparent;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
}

.size-btn:hover {
    border-color: #111;
}

.size-btn.active {
    border-color: #ff3f6c;
    background: #ff3f6c;
    color: #fff;
}

/* ===== TOAST ===== */
.toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a2e;
    color: #fff;
    padding: 14px 28px;
    border-radius: 16px;
    font-size: 14px;
    font-weight: 500;
    z-index: 9999;
    display: none;
    animation: slideUp 0.4s ease;
    box-shadow: 0 10px 50px rgba(0,0,0,0.2);
}

@keyframes slideUp {
    from {
        transform: translateX(-50%) translateY(20px);
        opacity: 0;
    }
    to {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
    }
}

/* ===== MODAL ===== */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    z-index: 5000;
    display: none;
    align-items: flex-end;
    justify-content: center;
}

.modal-overlay.show {
    display: flex;
}

.modal {
    background: #fff;
    width: 100%;
    max-width: 500px;
    max-height: 85vh;
    border-radius: 28px 28px 0 0;
    padding: 24px 20px 30px;
    overflow-y: auto;
    animation: modalSlide 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

@keyframes modalSlide {
    from {
        transform: translateY(100%);
    }
    to {
        transform: translateY(0);
    }
}

.modal-close {
    position: sticky;
    top: 0;
    float: right;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    background: #f5f5f7;
    font-size: 22px;
    cursor: pointer;
    transition: all 0.3s;
}

.modal-close:hover {
    background: #eee;
    transform: rotate(90deg);
}

/* ===== BOTTOM NAV ===== */
.bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 78px;
    background: #fff;
    display: flex;
    justify-content: space-around;
    align-items: center;
    border-top: 1px solid #ececec;
    z-index: 1000;
    padding-bottom: env(safe-area-inset-bottom);
}

.nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 500;
    color: #888;
    cursor: pointer;
    background: none;
    border: none;
    padding: 4px 8px;
    transition: all 0.3s;
    position: relative;
}

.nav-item.active {
    color: #ff3f6c;
}

.nav-item.active::before {
    content: '';
    position: absolute;
    top: -2px;
    left: 50%;
    transform: translateX(-50%);
    width: 20px;
    height: 3px;
    background: #ff3f6c;
    border-radius: 10px;
}

.nav-item .icon {
    font-size: 22px;
    font-weight: 300;
    margin-bottom: 2px;
}

.nav-item span {
    font-size: 9px;
    letter-spacing: 0.3px;
}

.gesture-bar {
    position: fixed;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 130px;
    height: 5px;
    background: #ddd;
    border-radius: 50px;
    z-index: 1001;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 380px) {
    .banner {
        height: 160px;
    }
    .banner-overlay h1 {
        font-size: 24px;
    }
    .card img {
        height: 190px;
    }
    .products {
        gap: 12px;
    }
}

@media (min-width: 600px) {
    .products {
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        padding: 0 30px 30px;
    }
}

@media (min-width: 1024px) {
    .products {
        grid-template-columns: repeat(4, 1fr);
        max-width: 1200px;
        margin: 0 auto;
    }
    .banner-section, .categories, .section-title {
        max-width: 1200px;
        margin-left: auto;
        margin-right: auto;
    }
}
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<div class="header">
    <div class="top-bar">
        <div class="logo" onclick="closeModal()">JMD<span>BOOT</span></div>
        <div class="icons">
            <div onclick="openWishlist()">
                ♡
                <span class="wishlist-count" id="wishlistCount">0</span>
            </div>
            <div onclick="openCart()">
                🛒
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </div>
    <div class="search">
        <span style="color:#999;">⌕</span>
        <input type="text" id="searchInput" placeholder="Search sneakers, boots, shoes..." oninput="handleSearch(this.value)">
    </div>
</div>

<!-- ===== BANNER ===== -->
<div class="banner-section">
    <div class="banner">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=1200&auto=format&fit=crop" alt="Banner">
        <div class="banner-overlay">
            <h1>NEW<br>COLLECTION</h1>
            <p>Premium Sneakers & Luxury Streetwear</p>
            <button onclick="filterProducts('all')">SHOP NOW</button>
        </div>
    </div>
</div>

<!-- ===== CATEGORIES ===== -->
<div class="section-title">
    Categories
    <a href="#" onclick="filterProducts('all')">See All</a>
</div>
<div class="categories" id="categoryContainer">
    <div class="category active" onclick="filterProducts('all', this)">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=500&auto=format&fit=crop">
        <p>All</p>
    </div>
    <div class="category" onclick="filterProducts('sneakers', this)">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=500&auto=format&fit=crop">
        <p>Sneakers</p>
    </div>
    <div class="category" onclick="filterProducts('running', this)">
        <img src="https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77?q=80&w=500&auto=format&fit=crop">
        <p>Running</p>
    </div>
    <div class="category" onclick="filterProducts('boots', this)">
        <img src="https://images.unsplash.com/photo-1543508282-6319a3e2621f?q=80&w=500&auto=format&fit=crop">
        <p>Boots</p>
    </div>
    <div class="category" onclick="filterProducts('casual', this)">
        <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?q=80&w=500&auto=format&fit=crop">
        <p>Casual</p>
    </div>
</div>

<!-- ===== PRODUCTS ===== -->
<div class="section-title">
    Trending Now
    <a href="#" onclick="sortProducts('popular')">Popular</a>
</div>
<div class="products" id="productGrid">
    <!-- Products will be rendered by JavaScript -->
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<!-- ===== MODAL ===== -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this) closeModal()">
    <div class="modal" id="modalContent"></div>
</div>

<!-- ===== BOTTOM NAV ===== -->
<div class="bottom-nav">
    <button class="nav-item active" onclick="filterProducts('all'); closeModal();">
        <div class="icon">⌂</div>
        <span>HOME</span>
    </button>
    <button class="nav-item" onclick="document.getElementById('searchInput').focus();">
        <div class="icon">⌕</div>
        <span>SEARCH</span>
    </button>
    <button class="nav-item" onclick="openWishlist()">
        <div class="icon">♡</div>
        <span>WISHLIST</span>
    </button>
    <button class="nav-item" onclick="openCart()">
        <div class="icon">🛒</div>
        <span>CART</span>
    </button>
    <button class="nav-item" onclick="openProfile()">
        <div class="icon">◉</div>
        <span>PROFILE</span>
    </button>
</div>
<div class="gesture-bar"></div>

<!-- ========================================== -->
<!-- JAVASCRIPT - FULL FUNCTIONALITY -->
<!-- ========================================== -->
<script>
    // ===== PRODUCT DATA =====
    const productData = [
        {
            id: 1,
            brand: "Nike",
            name: "Air Max Premium",
            category: "sneakers",
            image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=900&auto=format&fit=crop",
            price: 3999,
            oldPrice: 7999,
            rating: 4.8,
            reviews: 245,
            badge: "NEW"
        },
        {
            id: 2,
            brand: "Adidas",
            name: "Ultraboost Running",
            category: "running",
            image: "https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77?q=80&w=900&auto=format&fit=crop",
            price: 2499,
            oldPrice: 5999,
            rating: 4.7,
            reviews: 189,
            badge: "HOT"
        },
        {
            id: 3,
            brand: "Puma",
            name: "Leather Boots",
            category: "boots",
            image: "https://images.unsplash.com/photo-1543508282-6319a3e2621f?q=80&w=900&auto=format&fit=crop",
            price: 4299,
            oldPrice: 8999,
            rating: 4.6,
            reviews: 132,
            badge: "TRENDING"
        },
        {
            id: 4,
            brand: "Reebok",
            name: "Casual Classic",
            category: "casual",
            image: "https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?q=80&w=900&auto=format&fit=crop",
            price: 2999,
            oldPrice: 6299,
            rating: 4.5,
            reviews: 98,
            badge: "SALE"
        },
        {
            id: 5,
            brand: "Woodland",
            name: "Adventure Boots",
            category: "boots",
            image: "https://images.unsplash.com/photo-1556905055-8f358a7a47b2?q=80&w=900&auto=format&fit=crop",
            price: 5499,
            oldPrice: 9999,
            rating: 4.9,
            reviews: 312,
            badge: "BEST"
        },
        {
            id: 6,
            brand: "New Balance",
            name: "Fresh Foam",
            category: "running",
            image: "https://images.unsplash.com/photo-1560769629-975ec94e6a86?q=80&w=900&auto=format&fit=crop",
            price: 3599,
            oldPrice: 6999,
            rating: 4.7,
            reviews: 167,
            badge: "NEW"
        }
    ];

    // ===== STATE =====
    let products = [...productData];
    let cart = [];
    let wishlist = [];
    let currentFilter = 'all';
    let currentUser = null;

    // ===== INIT =====
    function init() {
        renderProducts();
        updateCounts();
        loadFromStorage();
    }

    // ===== RENDER PRODUCTS =====
    function renderProducts(filter = 'all', search = '') {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = '';

        let filtered = filter === 'all' ? products : products.filter(p => p.category === filter);

        if (search.trim()) {
            const s = search.toLowerCase();
            filtered = filtered.filter(p =>
                p.name.toLowerCase().includes(s) ||
                p.brand.toLowerCase().includes(s)
            );
        }

        if (filtered.length === 0) {
            grid.innerHTML = `
                <div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:#999;">
                    <div style="font-size:48px;margin-bottom:16px;">🔍</div>
                    <div style="font-weight:600;">No products found</div>
                </div>
            `;
            return;
        }

        filtered.forEach(p => {
            const inWishlist = wishlist.some(w => w.id === p.id);
            const discount = Math.round(((p.oldPrice - p.price) / p.oldPrice) * 100);

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-img">
                    <span class="badge ${p.badge === 'SALE' ? 'sale' : ''}">${p.badge}</span>
                    <button class="wishlist-btn ${inWishlist ? 'active' : ''}" onclick="event.stopPropagation(); toggleWishlist(${p.id})">
                        ${inWishlist ? '❤️' : '♡'}
                    </button>
                    <img src="${p.image}" alt="${p.name}" onclick="openProductDetail(${p.id})">
                    <div class="quick-add">
                        <button onclick="event.stopPropagation(); addToCart(${p.id})">🛒 Add to Bag</button>
                    </div>
                </div>
                <div class="info" onclick="openProductDetail(${p.id})">
                    <div class="brand">${p.brand}</div>
                    <div class="name">${p.name}</div>
                    <div class="rating">⭐ ${p.rating} <span>(${p.reviews})</span></div>
                    <div class="price">
                        <span class="new-price">₹${p.price.toLocaleString()}</span>
                        <span class="old-price">₹${p.oldPrice.toLocaleString()}</span>
                        <span class="discount">${discount}% OFF</span>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // ===== FILTER =====
    function filterProducts(category, el) {
        currentFilter = category;
        document.querySelectorAll('.category').forEach(c => c.classList.remove('active'));
        if (el) el.classList.add('active');
        else document.querySelector('.category:first-child')?.classList.add('active');

        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.querySelector('.nav-item:first-child')?.classList.add('active');

        renderProducts(category, document.getElementById('searchInput').value);
        closeModal();
    }

    // ===== SEARCH =====
    function handleSearch(query) {
        renderProducts(currentFilter, query);
    }

    // ===== TOAST =====
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2200);
    }

    // ===== WISHLIST =====
    function toggleWishlist(id) {
        const product = products.find(p => p.id === id);
        if (!product) return;

        const idx = wishlist.findIndex(w => w.id === id);
        if (idx > -1) {
            wishlist.splice(idx, 1);
            showToast('♡ Removed from wishlist');
        } else {
            wishlist.push(product);
            showToast('❤️ Added to wishlist');
        }
        updateCounts();
        saveToStorage();
        renderProducts(currentFilter, document.getElementById('searchInput').value);
    }

    function openWishlist() {
        if (wishlist.length === 0) {
            showToast('❤️ Wishlist is empty');
            return;
        }
        let html = `
            <button class="modal-close" onclick="closeModal()">✕</button>
            <h2 style="font-size:22px;margin:8px 0 16px;">❤️ My Wishlist</h2>
        `;
        wishlist.forEach(p => {
            html += `
                <div style="display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid #eee;">
                    <img src="${p.image}" style="width:60px;height:60px;border-radius:12px;object-fit:cover;">
                    <div style="flex:1;">
                        <strong>${p.brand}</strong>
                        <div style="font-size:12px;color:#888;">${p.name}</div>
                        <strong>₹${p.price.toLocaleString()}</strong>
                    </div>
                    <button onclick="removeFromWishlist(${p.id})" style="background:#ff3f6c;color:#fff;border:none;padding:6px 14px;border-radius:10px;cursor:pointer;">✕</button>
                </div>
            `;
        });
        html += `<button onclick="closeModal()" style="width:100%;padding:14px;border:none;background:#f5f5f7;border-radius:14px;font-weight:600;cursor:pointer;margin-top:12px;">Close</button>`;
        openModal(html);
    }

    function removeFromWishlist(id) {
        wishlist = wishlist.filter(w => w.id !== id);
        updateCounts();
        saveToStorage();
        openWishlist();
        renderProducts(currentFilter);
        showToast('♡ Removed');
    }

    // ===== CART =====
    function addToCart(id) {
        const product = products.find(p => p.id === id);
        if (!product) return;

        const existing = cart.find(c => c.id === id);
        if (existing) {
            existing.qty += 1;
        } else {
            cart.push({ ...product, qty: 1 });
        }
        updateCounts();
        saveToStorage();
        showToast(`🛍️ ${product.name} added!`);
    }

    function openCart() {
        if (cart.length === 0) {
            showToast('🛒 Cart is empty');
            return;
        }
        let total = cart.reduce((sum, c) => sum + (c.price * c.qty), 0);
        let html = `
            <button class="modal-close" onclick="closeModal()">✕</button>
            <h2 style="font-size:22px;margin:8px 0 16px;">🛒 My Bag</h2>
        `;
        cart.forEach(c => {
            html += `
                <div style="display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid #eee;">
                    <img src="${c.image}" style="width:60px;height:60px;border-radius:12px;object-fit:cover;">
                    <div style="flex:1;">
                        <strong>${c.brand}</strong>
                        <div style="font-size:12px;color:#888;">${c.name}</div>
                        <strong>₹${c.price.toLocaleString()}</strong> × ${c.qty}
                    </div>
                    <button onclick="removeFromCart(${c.id})" style="background:#ff3f6c;color:#fff;border:none;padding:6px 14px;border-radius:10px;cursor:pointer;">✕</button>
                </div>
            `;
        });
        html += `
            <div style="font-size:20px;font-weight:700;padding:16px;text-align:center;background:#f5f5f7;border-radius:14px;margin:12px 0;">
                Total: ₹${total.toLocaleString()}
            </div>
            <button onclick="checkout()" style="width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,#ff3f6c,#ff6b8a);color:#fff;font-weight:700;font-size:16px;cursor:pointer;">💳 Proceed to Pay</button>
            <button onclick="closeModal()" style="width:100%;padding:14px;border:2px solid #ff3f6c;border-radius:14px;background:transparent;color:#ff3f6c;font-weight:600;cursor:pointer;margin-top:8px;">Continue Shopping</button>
        `;
        openModal(html);
    }

    function removeFromCart(id) {
        cart = cart.filter(c => c.id !== id);
        updateCounts();
        saveToStorage();
        openCart();
        showToast('Removed from cart');
    }

    function checkout() {
        const total = cart.reduce((sum, c) => sum + (c.price * c.qty), 0);
        const items = cart.map(c => `${c.brand} ${c.name} × ${c.qty}`).join('\n');
        showToast('🎉 Order Placed!');
        alert(`🎉 ORDER CONFIRMED!\n\n${items}\n\n💰 Total: ₹${total.toLocaleString()}\n📦 Delivery in 3-5 days\n\n❤️ Thank you for shopping!`);
        cart = [];
        updateCounts();
        saveToStorage();
        closeModal();
        renderProducts(currentFilter);
    }

    // ===== PROFILE =====
    function openProfile() {
        let html = `
            <button class="modal-close" onclick="closeModal()">✕</button>
            <h2 style="font-size:22px;margin:8px 0 16px;">👤 ${currentUser ? 'Profile' : 'Welcome'}</h2>
        `;
        if (currentUser) {
            html += `
                <div style="text-align:center;padding:20px 0;">
                    <div style="font-size:64px;margin-bottom:12px;">👤</div>
                    <h3>${currentUser.name}</h3>
                    <p style="color:#888;">${currentUser.email}</p>
                    <button onclick="logout()" style="width:100%;padding:14px;border:none;border-radius:14px;background:#ff3f6c;color:#fff;font-weight:600;cursor:pointer;margin-top:16px;">Logout</button>
                </div>
            `;
        } else {
            html += `
                <div id="loginForm">
                    <label style="font-weight:600;font-size:13px;">Email</label>
                    <input type="email" id="loginEmail" placeholder="you@example.com" style="width:100%;padding:14px;border:2px solid #eee;border-radius:12px;margin:4px 0 12px;font-size:14px;">
                    <label style="font-weight:600;font-size:13px;">Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" style="width:100%;padding:14px;border:2px solid #eee;border-radius:12px;margin:4px 0 12px;font-size:14px;">
                    <button onclick="loginUser()" style="width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#ff3f6c,#ff6b8a);color:#fff;font-weight:700;cursor:pointer;">Sign In</button>
                    <div onclick="showSignup()" style="text-align:center;margin-top:12px;color:#ff3f6c;font-weight:600;cursor:pointer;">Create an account</div>
                </div>
                <div id="signupForm" style="display:none;">
                    <label style="font-weight:600;font-size:13px;">Full Name</label>
                    <input type="text" id="signupName" placeholder="John Doe" style="width:100%;padding:14px;border:2px solid #eee;border-radius:12px;margin:4px 0 12px;font-size:14px;">
                    <label style="font-weight:600;font-size:13px;">Email</label>
                    <input type="email" id="signupEmail" placeholder="you@example.com" style="width:100%;padding:14px;border:2px solid #eee;border-radius:12px;margin:4px 0 12px;font-size:14px;">
                    <label style="font-weight:600;font-size:13px;">Password</label>
                    <input type="password" id="signupPassword" placeholder="Create password" style="width:100%;padding:14px;border:2px solid #eee;border-radius:12px;margin:4px 0 12px;font-size:14px;">
                    <button onclick="signupUser()" style="width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#ff3f6c,#ff6b8a);color:#fff;font-weight:700;cursor:pointer;">Create Account</button>
                    <div onclick="showLogin()" style="text-align:center;margin-top:12px;color:#ff3f6c;font-weight:600;cursor:pointer;">Already have an account?</div>
                </div>
            `;
        }
        openModal(html);
    }

    function showSignup() {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('signupForm').style.display = 'block';
    }

    function showLogin() {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('signupForm').style.display = 'none';
    }

    function loginUser() {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPassword').value;
        if (!email || !pass) { showToast('⚠️ Fill all fields'); return; }
        const userData = localStorage.getItem('user_' + email);
        if (userData) {
            const user = JSON.parse(userData);
            if (user.password === pass) {
                currentUser = user;
                showToast('✅ Welcome ' + user.name + '!');
                closeModal();
                return;
            }
        }
        showToast('❌ Invalid credentials');
    }

    function signupUser() {
        const name = document.getElementById('signupName').value;
        const email = document.getElementById('signupEmail').value;
        const pass = document.getElementById('signupPassword').value;
        if (!name || !email || !pass) { showToast('⚠️ Fill all fields'); return; }
        const user = { name, email, password: pass };
        localStorage.setItem('user_' + email, JSON.stringify(user));
        currentUser = user;
        showToast('✅ Welcome ' + name + '!');
        closeModal();
    }

    function logout() {
        currentUser = null;
        showToast('👋 Logged out');
        closeModal();
    }

    // ===== PRODUCT DETAIL =====
    function openProductDetail(id) {
        const p = products.find(pr => pr.id === id);
        if (!p) return;

        const inWishlist = wishlist.some(w => w.id === p.id);
        const discount = Math.round(((p.oldPrice - p.price) / p.oldPrice) * 100);

        let html = `
            <button class="modal-close" onclick="closeModal()">✕</button>
            <img src="${p.image}" style="width:100%;height:280px;object-fit:cover;border-radius:16px;">
            <div style="margin-top:16px;">
                <div style="font-size:22px;font-weight:700;">${p.brand}</div>
                <div style="font-size:14px;color:#888;">${p.name}</div>
                <div style="margin:6px 0;">⭐ ${p.rating} <span style="color:#888;">(${p.reviews} reviews)</span></div>
                <div style="font-size:24px;font-weight:700;">
                    ₹${p.price.toLocaleString()}
                    <span style="text-decoration:line-through;color:#999;font-size:16px;font-weight:400;margin-left:8px;">₹${p.oldPrice.toLocaleString()}</span>
                    <span style="color:#ff3f6c;font-size:14px;">(${discount}% OFF)</span>
                </div>
                <div style="margin:12px 0;">
                    <strong>Select Size</strong>
                    <div style="display:flex;gap:8px;margin-top:6px;">
                        <button class="size-btn active" onclick="selectSize(this)">S</button>
                        <button class="size-btn" onclick="selectSize(this)">M</button>
                        <button class="size-btn" onclick="selectSize(this)">L</button>
                        <button class="size-btn" onclick="selectSize(this)">XL</button>
                    </div>
                </div>
                <button onclick="addToCart(${p.id}); closeModal();" style="width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,#ff3f6c,#ff6b8a);color:#fff;font-weight:700;font-size:16px;cursor:pointer;margin:8px 0;">
                    🛒 Add to Bag - ₹${p.price.toLocaleString()}
                </button>
                <button onclick="toggleWishlist(${p.id}); closeModal();" style="width:100%;padding:14px;border:2px solid #ff3f6c;border-radius:14px;background:transparent;color:#ff3f6c;font-weight:600;cursor:pointer;">
                    ${inWishlist ? '❤️ Remove from Wishlist' : '🤍 Add to Wishlist'}
                </button>
            </div>
        `;
        openModal(html);
    }

    function selectSize(btn) {
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // ===== MODAL HELPERS =====
    function openModal(html) {
        document.getElementById('modalContent').innerHTML = html;
        document.getElementById('modalOverlay').classList.add('show');
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('show');
    }

    // ===== COUNTS =====
    function updateCounts() {
        document.getElementById('wishlistCount').textContent = wishlist.length;
        document.getElementById('cartCount').textContent = cart.reduce((sum, c) => sum + c.qty, 0);
    }

    // ===== STORAGE =====
    function saveToStorage() {
        try {
            localStorage.setItem('jmd_cart', JSON.stringify(cart));
            localStorage.setItem('jmd_wishlist', JSON.stringify(wishlist));
        } catch (e) {}
    }

    function loadFromStorage() {
        try {
            const savedCart = localStorage.getItem('jmd_cart');
            const savedWishlist = localStorage.getItem('jmd_wishlist');
            if (savedCart) cart = JSON.parse(savedCart);
            if (savedWishlist) wishlist = JSON.parse(savedWishlist);
            updateCounts();
        } catch (e) {}
    }

    // ===== SORT =====
    function sortProducts(type) {
        if (type === 'popular') {
            products.sort((a, b) => b.rating - a.rating);
        }
        renderProducts(currentFilter, document.getElementById('searchInput').value);
    }

    // ===== INIT =====
    init();
</script>
</body>
</html>
