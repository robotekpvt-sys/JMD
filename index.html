<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JMD Boot House - Premium Footwear</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ===== SAME CSS AS BEFORE - COPY FROM PREVIOUS CODE ===== */
/* (All CSS remains same, no changes needed) */

/* ===== LOADING OVERLAY ===== */
.loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--bg-primary);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 99999;
    transition: opacity 0.5s ease;
}

.loading-overlay.hide {
    opacity: 0;
    pointer-events: none;
}

.loading-spinner {
    width: 50px;
    height: 50px;
    border: 4px solid var(--border-color);
    border-top: 4px solid #ff3f6c;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.loading-text {
    margin-top: 16px;
    font-weight: 500;
    color: var(--text-secondary);
}
</style>
</head>
<body>

<!-- ===== LOADING OVERLAY ===== -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">🔄 Loading Products...</div>
</div>

<!-- ===== HEADER ===== -->
<div class="header">
    <div class="top-bar">
        <div class="logo" onclick="closeModal()">
            <span class="jmd">JMD</span><span class="boot">BOOT</span>
        </div>
        <div class="icons">
            <button class="dark-toggle" onclick="toggleDarkMode()">🌙</button>
            <div onclick="openWishlist()">
                🤍
                <span class="badge-count" id="wishlistCount">0</span>
            </div>
            <div onclick="openCart()">
                🛒
                <span class="badge-count" id="cartCount">0</span>
            </div>
            <div onclick="openProfile()">👤</div>
        </div>
    </div>
    <div class="search">
        <span class="icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search sneakers, boots, shoes..." oninput="handleSearch(this.value)">
    </div>
</div>

<!-- ===== BANNER SLIDER ===== -->
<div class="banner-section">
    <div class="banner-slider" id="bannerSlider">
        <div class="banner-track" id="bannerTrack">
            <!-- Slide 1 -->
            <div class="banner-slide">
                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=1200&auto=format&fit=crop" alt="Banner 1">
                <div class="overlay">
                    <h1>NEW<br>COLLECTION</h1>
                    <p>Premium Sneakers & Luxury Streetwear</p>
                    <button onclick="filterProducts('all')">SHOP NOW</button>
                </div>
            </div>
            <!-- Slide 2 -->
            <div class="banner-slide">
                <img src="https://images.unsplash.com/photo-1556905055-8f358a7a47b2?q=80&w=1200&auto=format&fit=crop" alt="Banner 2">
                <div class="overlay">
                    <h1>WINTER<br>SALE</h1>
                    <p>Up to 60% off on Boots & Sneakers</p>
                    <button onclick="filterProducts('boots')">EXPLORE</button>
                </div>
            </div>
            <!-- Slide 3 -->
            <div class="banner-slide">
                <img src="https://images.unsplash.com/photo-1562183241-b937e95585b6?q=80&w=1200&auto=format&fit=crop" alt="Banner 3">
                <div class="overlay">
                    <h1>LUXURY<br>EDIT</h1>
                    <p>Premium Brands at Best Prices</p>
                    <button onclick="filterProducts('sneakers')">VIEW COLLECTION</button>
                </div>
            </div>
        </div>

        <!-- Arrows -->
        <button class="banner-arrow prev" onclick="prevSlide()">‹</button>
        <button class="banner-arrow next" onclick="nextSlide()">›</button>

        <!-- Dots -->
        <div class="banner-dots" id="bannerDots">
            <button class="banner-dot active" onclick="goToSlide(0)"></button>
            <button class="banner-dot" onclick="goToSlide(1)"></button>
            <button class="banner-dot" onclick="goToSlide(2)"></button>
        </div>
    </div>
</div>

<!-- ===== CATEGORIES ===== -->
<div class="section-header">
    <span class="section-title">Categories</span>
    <span class="section-link" onclick="filterProducts('all')">See All</span>
</div>
<div class="categories" id="categoryContainer">
    <div class="category active" onclick="filterProducts('all', this)">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=500&auto=format&fit=crop">
        <p>All</p>
    </div>
    <div class="category" onclick="filterProducts('sneakers', this)">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=500&auto=format&fit=crop">
        <p>Sneakers</p>
    </div>
    <div class="category" onclick="filterProducts('running', this)">
        <img src="https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77?q=80&w=500&auto=format&fit=crop">
        <p>Running</p>
    </div>
    <div class="category" onclick="filterProducts('boots', this)">
        <img src="https://images.unsplash.com/photo-1543508282-6319a3e2621f?q=80&w=500&auto=format&fit=crop">
        <p>Boots</p>
    </div>
    <div class="category" onclick="filterProducts('casual', this)">
        <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?q=80&w=500&auto=format&fit=crop">
        <p>Casual</p>
    </div>
</div>

<!-- ===== PRODUCTS ===== -->
<div class="section-header">
    <span class="section-title">Trending Now</span>
    <span class="section-link" onclick="sortProducts('popular')">⭐ Popular</span>
</div>
<div class="products" id="productGrid"></div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<!-- ===== MODAL ===== -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this) closeModal()">
    <div class="modal" id="modalContent"></div>
</div>

<!-- ===== BOTTOM NAV ===== -->
<div class="bottom-nav">
    <button class="nav-item active" onclick="filterProducts('all'); closeModal();">
        <div class="icon">🏠</div>
        <span>HOME</span>
    </button>
    <button class="nav-item" onclick="document.getElementById('searchInput').focus();">
        <div class="icon">🔍</div>
        <span>SEARCH</span>
    </button>
    <button class="nav-item" onclick="openWishlist()">
        <div class="icon">🤍</div>
        <span>WISHLIST</span>
    </button>
    <button class="nav-item" onclick="openCart()">
        <div class="icon">🛒</div>
        <span>CART</span>
    </button>
    <button class="nav-item" onclick="openProfile()">
        <div class="icon">👤</div>
        <span>PROFILE</span>
    </button>
</div>
<div class="gesture-bar"></div>

<script>
// ==========================================
// 🔥 GOOGLE SHEET API URL - YAHAN APNI URL PASTE KARO 🔥
// ==========================================
const GOOGLE_SHEET_API = "https://script.google.com/macros/s/AKfycbyZRKZmqlJjU3uU1mTelbBVEp5CtSAph1TnKVmQWI6lIN93Q8F48F_enqzfWmHEquro/exec";

// ==========================================
// STATE
// ==========================================
let products = [];
let cart = [];
let wishlist = [];
let orders = [];
let currentFilter = 'all';
let currentUser = null;
let isDarkMode = false;
let isLoading = true;

// ===== BANNER SLIDER STATE =====
let currentBannerSlide = 0;
let bannerInterval = null;
const totalBannerSlides = 3;

// ==========================================
// FETCH PRODUCTS FROM GOOGLE SHEET
// ==========================================
async function fetchProducts() {
    try {
        showLoading(true);
        
        const response = await fetch(GOOGLE_SHEET_API);
        
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const data = await response.json();
        
        if (Array.isArray(data) && data.length > 0) {
            products = data.map(item => ({
                id: parseInt(item.id) || Math.random(),
                brand: item.brand || 'Unknown',
                name: item.name || 'Product',
                category: item.category || 'all',
                image: item.image || 'https://via.placeholder.com/300',
                price: parseInt(item.price) || 0,
                oldPrice: parseInt(item.oldPrice) || 0,
                rating: parseFloat(item.rating) || 4.0,
                reviews: parseInt(item.reviews) || 0,
                badge: item.badge || 'NEW'
            }));
            
            showToast('✅ ' + products.length + ' products loaded from Google Sheet!');
        } else {
            throw new Error('No data found in Google Sheet');
        }
        
    } catch (error) {
        console.error('❌ Error fetching from Google Sheet:', error);
        showToast('⚠️ Using fallback products');
        products = getFallbackProducts();
    }
    
    showLoading(false);
    renderProducts();
    updateCounts();
    initBannerSlider();
}

// ==========================================
// FALLBACK PRODUCTS (If Google Sheet fails)
// ==========================================
function getFallbackProducts() {
    return [
        { id: 1, brand: "Nike", name: "Air Max Premium", category: "sneakers", image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=900&auto=format&fit=crop", price: 3999, oldPrice: 7999, rating: 4.8, reviews: 245, badge: "NEW" },
        { id: 2, brand: "Adidas", name: "Ultraboost Running", category: "running", image: "https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77?q=80&w=900&auto=format&fit=crop", price: 2499, oldPrice: 5999, rating: 4.7, reviews: 189, badge: "HOT" },
        { id: 3, brand: "Puma", name: "Leather Boots", category: "boots", image: "https://images.unsplash.com/photo-1543508282-6319a3e2621f?q=80&w=900&auto=format&fit=crop", price: 4299, oldPrice: 8999, rating: 4.6, reviews: 132, badge: "TRENDING" },
        { id: 4, brand: "Reebok", name: "Casual Classic", category: "casual", image: "https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?q=80&w=900&auto=format&fit=crop", price: 2999, oldPrice: 6299, rating: 4.5, reviews: 98, badge: "SALE" },
        { id: 5, brand: "Woodland", name: "Adventure Boots", category: "boots", image: "https://images.unsplash.com/photo-1556905055-8f358a7a47b2?q=80&w=900&auto=format&fit=crop", price: 5499, oldPrice: 9999, rating: 4.9, reviews: 312, badge: "BEST" },
        { id: 6, brand: "New Balance", name: "Fresh Foam", category: "running", image: "https://images.unsplash.com/photo-1560769629-975ec94e6a86?q=80&w=900&auto=format&fit=crop", price: 3599, oldPrice: 6999, rating: 4.7, reviews: 167, badge: "NEW" }
    ];
}

// ==========================================
// LOADING OVERLAY
// ==========================================
function showLoading(show) {
    const overlay = document.getElementById('loadingOverlay');
    if (show) {
        overlay.classList.remove('hide');
    } else {
        setTimeout(() => overlay.classList.add('hide'), 500);
    }
}

// ==========================================
// RENDER PRODUCTS
// ==========================================
function renderProducts(filter = 'all', search = '') {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = '';

    let filtered = filter === 'all' ? products : products.filter(p => p.category === filter);

    if (search.trim()) {
        const s = search.toLowerCase();
        filtered = filtered.filter(p =>
            (p.name || '').toLowerCase().includes(s) ||
            (p.brand || '').toLowerCase().includes(s)
        );
    }

    if (filtered.length === 0) {
        grid.innerHTML = `
            <div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-muted);">
                <div style="font-size:48px;margin-bottom:16px;">🔍</div>
                <div style="font-weight:600;">No products found</div>
            </div>
        `;
        return;
    }

    filtered.forEach(p => {
        const inWishlist = wishlist.some(w => w.id === p.id);
        const discount = Math.round(((p.oldPrice - p.price) / p.oldPrice) * 100);
        const badgeClass = (p.badge || 'new').toLowerCase();

        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="card-img">
                <span class="badge ${badgeClass}">${p.badge || 'NEW'}</span>
                <button class="wishlist-btn ${inWishlist ? 'active' : ''}" onclick="event.stopPropagation(); toggleWishlist(${p.id})">
                    ${inWishlist ? '❤️' : '🤍'}
                </button>
                <img src="${p.image}" alt="${p.name}" onclick="openProductDetail(${p.id})" loading="lazy">
                <div class="quick-add">
                    <button onclick="event.stopPropagation(); addToCart(${p.id})">🛒 Add to Bag</button>
                </div>
            </div>
            <div class="info" onclick="openProductDetail(${p.id})">
                <div class="brand">${p.brand}</div>
                <div class="name">${p.name}</div>
                <div class="rating">⭐ ${p.rating || 4.0} <span>(${p.reviews || 0})</span></div>
                <div class="price">
                    <span class="new-price">₹${(p.price || 0).toLocaleString()}</span>
                    <span class="old-price">₹${(p.oldPrice || 0).toLocaleString()}</span>
                    <span class="discount">${discount}% OFF</span>
                </div>
            </div>
        `;
        grid.appendChild(card);
    });
}

// ==========================================
// BANNER SLIDER FUNCTIONS
// ==========================================
function initBannerSlider() {
    updateBannerPosition();
    startBannerAutoSlide();
}

function updateBannerPosition() {
    const track = document.getElementById('bannerTrack');
    track.style.transform = `translateX(-${currentBannerSlide * 100}%)`;
    
    document.querySelectorAll('.banner-dot').forEach((dot, index) => {
        dot.classList.toggle('active', index === currentBannerSlide);
    });
}

function goToSlide(index) {
    if (index < 0) index = totalBannerSlides - 1;
    if (index >= totalBannerSlides) index = 0;
    currentBannerSlide = index;
    updateBannerPosition();
    resetBannerAutoSlide();
}

function nextSlide() { goToSlide(currentBannerSlide + 1); }
function prevSlide() { goToSlide(currentBannerSlide - 1); }

function startBannerAutoSlide() {
    if (bannerInterval) clearInterval(bannerInterval);
    bannerInterval = setInterval(() => nextSlide(), 4000);
}

function resetBannerAutoSlide() {
    if (bannerInterval) {
        clearInterval(bannerInterval);
        startBannerAutoSlide();
    }
}

// ==========================================
// TOAST
// ==========================================
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    clearTimeout(t._timeout);
    t._timeout = setTimeout(() => t.style.display = 'none', 3000);
}

// ==========================================
// DARK MODE
// ==========================================
function toggleDarkMode() {
    isDarkMode = !isDarkMode;
    document.body.classList.toggle('dark-mode', isDarkMode);
    document.querySelector('.dark-toggle').textContent = isDarkMode ? '☀️' : '🌙';
    localStorage.setItem('jmd_darkmode', isDarkMode);
}

// ==========================================
// FILTER
// ==========================================
function filterProducts(category, el) {
    currentFilter = category;
    document.querySelectorAll('.category').forEach(c => c.classList.remove('active'));
    if (el) el.classList.add('active');
    else document.querySelector('.category:first-child')?.classList.add('active');

    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.querySelector('.nav-item:first-child')?.classList.add('active');

    renderProducts(category, document.getElementById('searchInput').value);
    closeModal();
}

function handleSearch(query) {
    renderProducts(currentFilter, query);
}

function sortProducts(type) {
    if (type === 'popular') {
        products.sort((a, b) => (b.rating || 0) - (a.rating || 0));
    }
    renderProducts(currentFilter, document.getElementById('searchInput').value);
    showToast('⭐ Sorted by popularity');
}

// ==========================================
// WISHLIST
// ==========================================
function toggleWishlist(id) {
    const product = products.find(p => p.id === id);
    if (!product) return;

    const idx = wishlist.findIndex(w => w.id === id);
    if (idx > -1) {
        wishlist.splice(idx, 1);
        showToast('♡ Removed from wishlist');
    } else {
        wishlist.push(product);
        showToast('❤️ Added to wishlist');
    }
    updateCounts();
    saveToStorage();
    renderProducts(currentFilter, document.getElementById('searchInput').value);
}

function openWishlist() {
    if (wishlist.length === 0) {
        showToast('🤍 Wishlist is empty');
        return;
    }
    let html = `<button class="modal-close" onclick="closeModal()">✕</button><h2 style="font-size:22px;margin:8px 0 16px;">🤍 My Wishlist (${wishlist.length})</h2>`;
    wishlist.forEach(p => {
        html += `
            <div style="display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border-color);">
                <img src="${p.image}" style="width:60px;height:60px;border-radius:12px;object-fit:cover;">
                <div style="flex:1;">
                    <strong>${p.brand}</strong>
                    <div style="font-size:12px;color:var(--text-secondary);">${p.name}</div>
                    <strong>₹${(p.price || 0).toLocaleString()}</strong>
                </div>
                <button onclick="removeFromWishlist(${p.id})" style="background:#ff3f6c;color:#fff;border:none;padding:6px 14px;border-radius:10px;cursor:pointer;">✕</button>
            </div>
        `;
    });
    html += `<button class="btn-secondary" onclick="closeModal()">Close</button>`;
    openModal(html);
}

function removeFromWishlist(id) {
    wishlist = wishlist.filter(w => w.id !== id);
    updateCounts();
    saveToStorage();
    openWishlist();
    renderProducts(currentFilter);
    showToast('♡ Removed');
}

// ==========================================
// CART
// ==========================================
function addToCart(id) {
    const product = products.find(p => p.id === id);
    if (!product) return;

    const existing = cart.find(c => c.id === id);
    if (existing) {
        existing.qty += 1;
    } else {
        cart.push({ ...product, qty: 1 });
    }
    updateCounts();
    saveToStorage();
    showToast(`🛍️ ${product.name} added!`);
}

function openCart() {
    if (cart.length === 0) {
        showToast('🛒 Cart is empty');
        return;
    }
    let total = cart.reduce((sum, c) => sum + ((c.price || 0) * c.qty), 0);
    let html = `
        <button class="modal-close" onclick="closeModal()">✕</button>
        <h2 style="font-size:22px;margin:8px 0 16px;">🛒 My Bag (${cart.reduce((s,c) => s + c.qty, 0)})</h2>
    `;
    cart.forEach(c => {
        html += `
            <div style="display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border-color);">
                <img src="${c.image}" style="width:60px;height:60px;border-radius:12px;object-fit:cover;">
                <div style="flex:1;">
                    <strong>${c.brand}</strong>
                    <div style="font-size:12px;color:var(--text-secondary);">${c.name}</div>
                    <strong>₹${(c.price || 0).toLocaleString()}</strong> × ${c.qty}
                </div>
                <div style="display:flex;gap:8px;align-items:center;">
                    <button onclick="updateCartQty(${c.id}, -1)" style="width:30px;height:30px;border-radius:50%;border:1px solid var(--border-color);background:transparent;cursor:pointer;font-size:16px;">−</button>
                    <span style="font-weight:600;min-width:20px;text-align:center;">${c.qty}</span>
                    <button onclick="updateCartQty(${c.id}, 1)" style="width:30px;height:30px;border-radius:50%;border:1px solid var(--border-color);background:transparent;cursor:pointer;font-size:16px;">+</button>
                </div>
            </div>
        `;
    });
    html += `
        <div style="font-size:20px;font-weight:700;padding:16px;text-align:center;background:var(--input-bg);border-radius:14px;margin:12px 0;">
            Total: ₹${total.toLocaleString()}
        </div>
        <button class="btn-primary" onclick="checkout()">💳 Proceed to Pay</button>
        <button class="btn-secondary" onclick="closeModal()">Continue Shopping</button>
    `;
    openModal(html);
}

function updateCartQty(id, delta) {
    const item = cart.find(c => c.id === id);
    if (!item) return;
    item.qty += delta;
    if (item.qty <= 0) {
        cart = cart.filter(c => c.id !== id);
    }
    updateCounts();
    saveToStorage();
    openCart();
}

function checkout() {
    if (cart.length === 0) { showToast('🛒 Cart is empty'); return; }
    
    const total = cart.reduce((sum, c) => sum + ((c.price || 0) * c.qty), 0);
    const orderId = 'ORD' + Date.now().toString().slice(-8);
    const items = cart.map(c => `${c.brand} ${c.name} × ${c.qty}`).join('\n');
    
    const order = {
        id: orderId,
        items: [...cart],
        total: total,
        date: new Date().toLocaleDateString(),
        status: 'processing'
    };
    orders.push(order);
    saveToStorage();
    
    showToast('🎉 Order Placed!');
    alert(`🎉 ORDER CONFIRMED!\n\nOrder ID: ${orderId}\n\n${items}\n\n💰 Total: ₹${total.toLocaleString()}\n📦 Delivery in 3-5 days\n\n❤️ Thank you for shopping!`);
    
    cart = [];
    updateCounts();
    saveToStorage();
    closeModal();
    renderProducts(currentFilter);
}

// ==========================================
// PROFILE & AUTH
// ==========================================
function openProfile() {
    let html = `<button class="modal-close" onclick="closeModal()">✕</button>`;
    
    if (currentUser) {
        html += `
            <div style="text-align:center;padding:10px 0 20px;">
                <div class="profile-avatar">${currentUser.name.charAt(0).toUpperCase()}</div>
                <h3 style="font-size:20px;">${currentUser.name}</h3>
                <p style="color:var(--text-secondary);font-size:13px;">${currentUser.email}</p>
                <div style="display:flex;justify-content:center;gap:30px;margin:12px 0;">
                    <div><strong>${orders.length}</strong><br><span style="font-size:11px;color:var(--text-secondary);">Orders</span></div>
                    <div><strong>${wishlist.length}</strong><br><span style="font-size:11px;color:var(--text-secondary);">Wishlist</span></div>
                </div>
            </div>
            <div class="profile-menu">
                <div class="profile-menu-item" onclick="openOrders()">
                    <div class="icon">📦</div>
                    <div class="label">My Orders</div>
                </div>
                <div class="profile-menu-item" onclick="openWishlist()">
                    <div class="icon">🤍</div>
                    <div class="label">Wishlist</div>
                </div>
                <div class="profile-menu-item" onclick="showToast('⚙️ Settings coming soon!')">
                    <div class="icon">⚙️</div>
                    <div class="label">Settings</div>
                </div>
                <div class="profile-menu-item" onclick="logoutUser()">
                    <div class="icon">🚪</div>
                    <div class="label">Logout</div>
                </div>
            </div>
        `;
    } else {
        html += `
            <h2 style="font-size:22px;margin:8px 0 16px;">👤 Welcome</h2>
            <div id="loginForm">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="you@example.com">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••">
                <button class="btn-primary" onclick="loginUser()">Sign In</button>
                <div onclick="showSignup()" style="text-align:center;margin-top:12px;color:#ff3f6c;font-weight:600;cursor:pointer;">Create an account</div>
            </div>
            <div id="signupForm" style="display:none;">
                <label>Full Name</label>
                <input type="text" id="signupName" placeholder="John Doe">
                <label>Email</label>
                <input type="email" id="signupEmail" placeholder="you@example.com">
                <label>Password</label>
                <input type="password" id="signupPassword" placeholder="Create password">
                <button class="btn-primary" onclick="signupUser()">Create Account</button>
                <div onclick="showLogin()" style="text-align:center;margin-top:12px;color:#ff3f6c;font-weight:600;cursor:pointer;">Already have an account?</div>
            </div>
        `;
    }
    openModal(html);
}

function showSignup() {
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('signupForm').style.display = 'block';
}

function showLogin() {
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('signupForm').style.display = 'none';
}

function loginUser() {
    const email = document.getElementById('loginEmail').value;
    const pass = document.getElementById('loginPassword').value;
    if (!email || !pass) { showToast('⚠️ Fill all fields'); return; }
    const userData = localStorage.getItem('user_' + email);
    if (userData) {
        const user = JSON.parse(userData);
        if (user.password === pass) {
            currentUser = user;
            showToast('✅ Welcome ' + user.name + '!');
            closeModal();
            return;
        }
    }
    showToast('❌ Invalid credentials');
}

function signupUser() {
    const name = document.getElementById('signupName').value;
    const email = document.getElementById('signupEmail').value;
    const pass = document.getElementById('signupPassword').value;
    if (!name || !email || !pass) { showToast('⚠️ Fill all fields'); return; }
    const user = { name, email, password: pass };
    localStorage.setItem('user_' + email, JSON.stringify(user));
    currentUser = user;
    showToast('✅ Welcome ' + name + '!');
    closeModal();
}

function logoutUser() {
    currentUser = null;
    showToast('👋 Logged out');
    closeModal();
}

function openOrders() {
    if (orders.length === 0) {
        showToast('📦 No orders yet');
        return;
    }
    let html = `
        <button class="modal-close" onclick="closeModal()">✕</button>
        <h2 style="font-size:22px;margin:8px 0 16px;">📦 My Orders (${orders.length})</h2>
    `;
    orders.slice().reverse().forEach(o => {
        html += `
            <div style="padding:14px;border:1px solid var(--border-color);border-radius:14px;margin-bottom:12px;">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <span style="font-size:13px;font-weight:600;">Order #${o.id}</span>
                    <span class="order-status ${o.status}">${o.status.toUpperCase()}</span>
                </div>
                <div style="font-size:12px;color:var(--text-secondary);">${o.date}</div>
                <div style="margin:8px 0;">
                    ${o.items.map(c => `${c.brand} ${c.name} × ${c.qty}`).join(', ')}
                </div>
                <div style="font-weight:700;">₹${o.total.toLocaleString()}</div>
            </div>
        `;
    });
    html += `<button class="btn-secondary" onclick="closeModal()">Close</button>`;
    openModal(html);
}

// ==========================================
// PRODUCT DETAIL
// ==========================================
function openProductDetail(id) {
    const p = products.find(pr => pr.id === id);
    if (!p) return;

    const inWishlist = wishlist.some(w => w.id === p.id);
    const discount = Math.round(((p.oldPrice - p.price) / p.oldPrice) * 100);

    let html = `
        <button class="modal-close" onclick="closeModal()">✕</button>
        <img src="${p.image}" style="width:100%;height:280px;object-fit:cover;border-radius:16px;">
        <div style="margin-top:16px;">
            <div style="font-size:22px;font-weight:700;">${p.brand}</div>
            <div style="font-size:14px;color:var(--text-secondary);">${p.name}</div>
            <div style="margin:6px 0;">⭐ ${p.rating} <span style="color:var(--text-secondary);">(${p.reviews} reviews)</span></div>
            <div style="font-size:24px;font-weight:700;">
                ₹${p.price.toLocaleString()}
                <span style="text-decoration:line-through;color:var(--text-muted);font-size:16px;font-weight:400;margin-left:8px;">₹${p.oldPrice.toLocaleString()}</span>
                <span style="color:#ff3f6c;font-size:14px;">(${discount}% OFF)</span>
            </div>
            <div style="margin:12px 0;">
                <strong>Select Size</strong>
                <div class="size-selector">
                    <button class="size-btn active" onclick="selectSize(this)">S</button>
                    <button class="size-btn" onclick="selectSize(this)">M</button>
                    <button class="size-btn" onclick="selectSize(this)">L</button>
                    <button class="size-btn" onclick="selectSize(this)">XL</button>
                </div>
            </div>
            <button class="btn-primary" onclick="addToCart(${p.id}); closeModal();">
                🛒 Add to Bag - ₹${p.price.toLocaleString()}
            </button>
            <button class="btn-secondary" onclick="toggleWishlist(${p.id}); closeModal();">
                ${inWishlist ? '❤️ Remove from Wishlist' : '🤍 Add to Wishlist'}
            </button>
        </div>
    `;
    openModal(html);
}

function selectSize(btn) {
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

// ==========================================
// MODAL HELPERS
// ==========================================
function openModal(html) {
    document.getElementById('modalContent').innerHTML = html;
    document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
}

// ==========================================
// COUNTS & STORAGE
// ==========================================
function updateCounts() {
    document.getElementById('wishlistCount').textContent = wishlist.length;
    document.getElementById('cartCount').textContent = cart.reduce((sum, c) => sum + c.qty, 0);
}

function saveToStorage() {
    try {
        localStorage.setItem('jmd_cart', JSON.stringify(cart));
        localStorage.setItem('jmd_wishlist', JSON.stringify(wishlist));
        localStorage.setItem('jmd_orders', JSON.stringify(orders));
        if (currentUser) localStorage.setItem('jmd_user', JSON.stringify(currentUser));
    } catch (e) {}
}

function loadFromStorage() {
    try {
        const savedCart = localStorage.getItem('jmd_cart');
        const savedWishlist = localStorage.getItem('jmd_wishlist');
        const savedOrders = localStorage.getItem('jmd_orders');
        const savedUser = localStorage.getItem('jmd_user');
        const darkMode = localStorage.getItem('jmd_darkmode');
        
        if (savedCart) cart = JSON.parse(savedCart);
        if (savedWishlist) wishlist = JSON.parse(savedWishlist);
        if (savedOrders) orders = JSON.parse(savedOrders);
        if (savedUser) currentUser = JSON.parse(savedUser);
        if (darkMode === 'true') isDarkMode = true;
        
        updateCounts();
    } catch (e) {}
}

// ==========================================
// KEYBOARD SHORTCUTS
// ==========================================
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
});

// ==========================================
// INIT
// ==========================================
async function init() {
    loadFromStorage();
    if (isDarkMode) document.body.classList.add('dark-mode');
    
    // Fetch products from Google Sheet
    await fetchProducts();
    
    // Setup banner slider
    initBannerSlider();
}

init();
</script>
</body>
</html>
